<style>
:root{
  --bg:#F7F7F5;--bg2:#EFEFED;--surface:#FFFFFF;--border:#E2E2DE;--border2:#CACAC4;
  --text:#111111;--text2:#555550;--text3:#99998E;
  --accent:#B8960C;--accent-bg:#F8F2DC;--accent2:#8B6F00;
  --red:#C0392B;--green:#27AE60;--blue:#2471A3;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  --shadow-card:0 1px 2px rgba(0,0,0,.06);
  --r:4px;
  --ui:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  --head:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
  --mono:"SF Mono","Menlo","Monaco",monospace;
}
[data-theme=dark]{
  --bg:#0C0C0E;--bg2:#161410;--surface:#111009;--border:#2A2818;--border2:#3A3520;
  --text:#E8D5A3;--text2:#8A7E68;--text3:#5A5030;
  --accent:#C9A84C;--accent-bg:rgba(201,168,76,.1);--accent2:#E8D5A3;
  --red:#F87171;--green:#34D399;--blue:#60A5FA;
  --shadow:none;--shadow-card:none;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--ui);font-size:14px;min-height:100vh;transition:background .2s,color .2s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* HEADER */
.hdr{background:var(--surface);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
.hdr-brand{display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--border)}
.logo-wrap{display:flex;align-items:baseline;gap:0;padding:14px 0 10px;flex:1}
.logo{font-family:var(--head);font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--text);text-transform:uppercase;border-bottom:2.5px solid var(--accent);padding-bottom:2px;line-height:1}
.logo-sub{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-left:10px;align-self:center}
.hdr-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.hdr-time{font-family:var(--mono);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.live{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.theme-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 9px;cursor:pointer;font-size:13px;transition:all .15s;color:var(--text2)}
.theme-btn:hover{border-color:var(--border2)}
.gear-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:4px;line-height:1;border-radius:var(--r);transition:color .15s}
.gear-btn:hover{color:var(--accent)}
.lang-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--text2);transition:all .15s}
.lang-btn:hover{border-color:var(--border2)}
.lang-btn.translating{border-color:var(--accent);color:var(--accent);animation:blink 1.5s infinite}
.settings-panel{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 28px;display:none;align-items:center;gap:10px;flex-wrap:wrap}
.settings-panel.open{display:flex}
.settings-label{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap}
.settings-input{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:5px 10px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none}
.settings-input:focus{border-color:var(--accent)}
.settings-input::placeholder{color:var(--text3)}
.settings-save{padding:5px 14px;background:var(--accent-bg);border:1px solid var(--accent);border-radius:var(--r);color:var(--accent2);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .12s}
.settings-save:hover{background:var(--accent);color:#fff}
.settings-note{font-family:var(--mono);font-size:9px;color:var(--text3);width:100%}

/* NAV — category tabs */
.fbar{display:flex;align-items:center;gap:0;padding:0 28px;overflow-x:auto;scrollbar-width:none;border-top:none}
.fbar::-webkit-scrollbar{display:none}
.fbtn{padding:11px 15px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--ui);font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;white-space:nowrap;margin-bottom:-1px}
.fbtn:hover{color:var(--text)}
.fbtn.on{color:var(--text);border-bottom-color:var(--accent);font-weight:600}
.fcnt{display:inline-block;font-size:10px;color:var(--text3);background:var(--bg2);border-radius:10px;padding:1px 6px;margin-left:4px;font-weight:400;font-family:var(--mono)}
.fbtn.on .fcnt{background:var(--accent-bg);color:var(--accent2)}
.rfbtn{margin-left:auto;display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-family:var(--ui);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.rfbtn:hover{background:var(--accent2)}
.rfbtn:disabled{opacity:.5;cursor:not-allowed}
.spin{display:inline-block;animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* TIME FILTER BAR */
/* ─── UNIFIED FILTER BAR ──────────────────────────────────── */
/*
  Layout:
  ┌─────────────────────────────────────────────────────────┐
  │ Пресса [Все][🇷🇺 Рус][🌐 Зар]  │  Период [Сег][Вчера][Все] │ ← Row 1 (fixed)
  ├─────────────────────────────────────────────────────────┤
  │ Источники ● Коммерсант ● Forbes ● BBC ● Al Jazeera …→  │ ← Row 2 (scrollable)
  └─────────────────────────────────────────────────────────┘
  Mobile: same 2-row layout, smaller font
*/
.filterbar {
  display: flex; flex-direction: column;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

/* Row 1: Press + Period */
.filterbar-row1 {
  display: flex; align-items: center;
  padding: 0 16px; gap: 0;
  border-bottom: 1px solid var(--border);
  flex-wrap: nowrap; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.filterbar-row1::-webkit-scrollbar { display: none; }

/* Row 2: Sources — scrolls independently */
.filterbar-row2 {
  display: flex; align-items: center;
  padding: 0 16px; gap: 0;
  position: relative; /* for fade overlay */
  overflow: hidden;
}
.filterbar-row2-scroll {
  display: flex; align-items: center; gap: 4px;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding: 5px 0 5px 0;
  flex: 1;
}
.filterbar-row2-scroll::-webkit-scrollbar { display: none; }
/* Right fade hint for scrollable content */
.filterbar-row2::after {
  content: ""; pointer-events: none;
  position: absolute; right: 0; top: 0; bottom: 0; width: 32px;
  background: linear-gradient(to right, transparent, var(--surface));
}

.fgroup {
  display: flex; align-items: center; gap: 3px;
  padding: 5px 0; flex-shrink: 0;
}

.fgroup-label {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  margin-right: 3px; white-space: nowrap; flex-shrink: 0;
  letter-spacing: .03em; text-transform: uppercase;
}

.fdivider {
  width: 1px; height: 18px; background: var(--border);
  margin: 0 10px; flex-shrink: 0;
}

.fbtn {
  padding: 3px 10px; background: none;
  border: 1px solid var(--border); border-radius: 20px;
  cursor: pointer; font-family: var(--ui); font-size: 11px;
  color: var(--text2); white-space: nowrap; transition: all .15s;
  flex-shrink: 0; line-height: 1.5;
}
.fbtn:hover { border-color: var(--text3); color: var(--text); }
.fbtn.on {
  background: var(--text); color: var(--surface);
  border-color: var(--text); font-weight: 600;
}
/* Source buttons slightly smaller */
.srcfbtn {
  font-size: 10.5px; padding: 2px 8px;
}

/* Mobile tweaks */
@media (max-width: 600px) {
  .filterbar-row1 { padding: 0 10px; }
  .filterbar-row2 { padding: 0 10px; }
  .fbtn  { font-size: 11px; padding: 3px 9px; }
  .srcfbtn { font-size: 10px; padding: 2px 7px; }
  .fgroup-label { font-size: 9px; margin-right: 2px; }
  .fdivider { margin: 0 7px; }
}


/* SOURCE FILTER BAR */
.srcbar{display:flex;align-items:center;gap:6px;padding:6px 28px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-wrap:wrap;transition:all .2s}
.srcbar.collapsed .srcbtn,.srcbar.collapsed .srcbar-label-full{display:none}
.srcbar-toggle{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:2px 6px;border-radius:4px;font-family:var(--ui);white-space:nowrap;flex-shrink:0}
.srcbar-toggle:hover{color:var(--text);background:var(--bg)}
.srcbar::-webkit-scrollbar{display:none}
.srcbtn{display:flex;align-items:center;gap:4px;padding:3px 9px;background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--text3);transition:all .15s;white-space:nowrap}
.srcbtn:hover{border-color:var(--border2);color:var(--text)}
.srcbtn.on{background:var(--text);color:var(--surface);border-color:var(--text)}
.srcbtn.ok  .srcdot{background:#22c55e}
.srcbtn.err .srcdot{background:var(--red)}
.srcbtn.load .srcdot{background:var(--accent);animation:blink 1s infinite}
.srcdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.srcbar-label{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0;margin-right:2px}
.src-clear{padding:3px 9px;background:none;border:1px dashed var(--border);border-radius:20px;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--text3);transition:all .15s;white-space:nowrap;flex-shrink:0}
.src-clear:hover{border-color:var(--red);color:var(--red)}

/* STATUS BAR */
.sbar{font-family:var(--mono);font-size:10px;color:var(--text3);padding:5px 28px;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:center;overflow-x:auto;scrollbar-width:none;white-space:nowrap;min-height:26px;background:var(--bg2)}
.sbar::-webkit-scrollbar{display:none}
.si{display:flex;align-items:center;gap:4px}.sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.si.ok .sd{background:#22c55e}.si.ok{color:var(--green);opacity:.8}
.si.err .sd{background:var(--red)}.si.err{color:var(--red);opacity:.8}
.si.load .sd{background:var(--accent);animation:blink 1s infinite}
.syp{color:var(--accent);margin-left:auto;animation:blink 1.5s infinite}

/* TICKER */
.ticker-wrap{overflow:hidden;background:var(--text);padding:6px 0}
.ticker-inner{display:flex;animation:tick 70s linear infinite;width:max-content}
.ticker-inner:hover{animation-play-state:paused}
@keyframes tick{to{transform:translateX(-50%)}}
.tick-item{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.45);padding:0 28px;white-space:nowrap}
.tick-item b{color:var(--accent);margin-right:5px}
[data-theme=dark] .tick-item{color:var(--text3)}

/* CONTENT */
.content{max-width:1240px;margin:0 auto;padding:28px 28px 48px}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px;margin-top:32px}
.sec-hdr:first-child{margin-top:0}
.slbl{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text)}
.sline{flex:1;height:1px;background:var(--border)}
.scnt{font-family:var(--mono);font-size:10px;color:var(--text3)}
.sdot{display:none}

/* Sub-sections */
.subsec{display:flex;align-items:center;gap:8px;margin:14px 0 10px;padding:7px 12px;border-radius:var(--r);font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.subsec.yaroslavl{background:#EAF4FB;color:#1A6DA5;border-left:3px solid #5DADE2}
.subsec.moscow   {background:#F4ECF7;color:#7D3C98;border-left:3px solid #AF7AC5}
.subsec.ru-eco   {background:#EAFAF1;color:#1E8449;border-left:3px solid #52BE80}
.subsec.world-eco{background:#FEF9E7;color:#9A7D0A;border-left:3px solid #F4D03F}
[data-theme=dark] .subsec.yaroslavl{background:rgba(93,173,226,.08);color:#5DADE2;border-left-color:#5DADE2}
[data-theme=dark] .subsec.moscow   {background:rgba(175,122,197,.08);color:#AF7AC5;border-left-color:#AF7AC5}
[data-theme=dark] .subsec.ru-eco   {background:rgba(82,190,128,.08);color:#52BE80;border-left-color:#52BE80}
[data-theme=dark] .subsec.world-eco{background:rgba(244,208,63,.08);color:#D4AC0D;border-left-color:#F4D03F}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px;margin-bottom:4px;align-items:start}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:box-shadow .15s,transform .15s,border-color .15s;position:relative;animation:rise .3s ease both;box-shadow:var(--shadow-card);height:200px;display:flex;flex-direction:column;overflow:hidden}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px);border-color:var(--border2)}
[data-theme=dark] .card:hover{box-shadow:none;transform:none;border-color:var(--accent)}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc,var(--accent));border-radius:var(--r) 0 0 var(--r);opacity:0;transition:opacity .2s}
.card:hover::before{opacity:1}
.ch{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.ctags{display:flex;flex-wrap:wrap;gap:4px}
.cbadge{font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:10px;font-weight:600}
.csub{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:10px;background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.csub.yaroslavl{background:#EAF4FB;color:#1A6DA5;border-color:#AED6F1}
.csub.moscow   {background:#F4ECF7;color:#7D3C98;border-color:#D7BDE2}
.csub.ru-eco   {background:#EAFAF1;color:#1E8449;border-color:#A9DFBF}
.csub.world-eco{background:#FEF9E7;color:#9A7D0A;border-color:#FAE5A0}
[data-theme=dark] .csub.yaroslavl{background:rgba(93,173,226,.1);color:#5DADE2;border-color:rgba(93,173,226,.3)}
[data-theme=dark] .csub.moscow   {background:rgba(175,122,197,.1);color:#AF7AC5;border-color:rgba(175,122,197,.3)}
[data-theme=dark] .csub.ru-eco   {background:rgba(82,190,128,.1);color:#52BE80;border-color:rgba(82,190,128,.3)}
[data-theme=dark] .csub.world-eco{background:rgba(244,208,63,.1);color:#D4AC0D;border-color:rgba(244,208,63,.3)}
.csynth{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:10px;background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent)}
.ctime{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.ctitle{font-family:var(--head);font-size:15px;font-weight:700;line-height:1.35;color:var(--text);margin-bottom:8px;letter-spacing:-.01em;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}

.persp{border-top:1px solid var(--border);padding-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pb{padding:8px 10px;border-radius:var(--r)}
.pb.ru  {background:#FEF0EF;border-left:2px solid #E74C3C}
.pb.west{background:#EBF5FB;border-left:2px solid #3498DB}
[data-theme=dark] .pb.ru  {background:rgba(231,76,60,.07);border-left-color:#F87171}
[data-theme=dark] .pb.west{background:rgba(52,152,219,.07);border-left-color:#60A5FA}
.pbl{font-family:var(--mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px}
.pb.ru   .pbl{color:#C0392B}
.pb.west .pbl{color:#2471A3}
[data-theme=dark] .pb.ru   .pbl{color:#F87171}
[data-theme=dark] .pb.west .pbl{color:#60A5FA}
.pbt{font-size:11px;line-height:1.5;color:var(--text2)}
.csrcs{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;margin-top:auto}
.chip{font-family:var(--mono);font-size:9px;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:1px 6px}

/* SKELETON */
.skel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;animation:shim 1.4s ease-in-out infinite}
@keyframes shim{0%,100%{opacity:.5}50%{opacity:1}}
.sl{height:9px;background:var(--bg2);border-radius:4px;margin-bottom:7px}
.sl-t{height:15px;background:var(--bg2);border-radius:4px;margin-bottom:5px}

/* MSG */
.empty{font-family:var(--mono);font-size:11px;color:var(--text3);padding:24px;text-align:center}
.msg-box{margin:40px auto;max-width:520px;border:1px solid var(--border);border-radius:8px;padding:32px;background:var(--surface);text-align:center;box-shadow:var(--shadow)}
.msg-title{font-family:var(--head);font-size:20px;font-weight:700;color:var(--text);margin-bottom:10px}
.msg-text{font-family:var(--mono);font-size:11px;color:var(--text3);line-height:1.8;margin-bottom:16px}
.rbtn{padding:8px 20px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-family:var(--ui);font-size:12px;font-weight:600;cursor:pointer;margin:4px}
.rbtn:hover{background:var(--accent2)}

/* TIME FILTER BAR */
.tbar{display:flex;align-items:center;gap:6px;padding:7px 28px;background:var(--surface);border-bottom:1px solid var(--border)}
.tbtn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:none;
      font-family:var(--ui);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.tbtn:hover{border-color:var(--border2);color:var(--text)}
.tbtn.on{background:var(--text);color:var(--surface);border-color:var(--text);font-weight:600}
[data-theme=dark] .tbtn.on{background:var(--accent);border-color:var(--accent);color:#0c0c0e}
.tbar-label{font-family:var(--mono);font-size:10px;color:var(--text3);margin-right:4px}

/* SOURCE FILTER BAR */
.srcbar{display:flex;align-items:center;gap:6px;padding:6px 28px;background:var(--bg2);
        border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.srcbar::-webkit-scrollbar{display:none}
.srcbar-label{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap;margin-right:2px}
.srcbtn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
        border-radius:20px;border:1px solid transparent;background:none;
        font-family:var(--mono);font-size:10px;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.srcbtn:hover{background:var(--surface);border-color:var(--border2);color:var(--text)}
.srcbtn.on{background:var(--surface);border-color:var(--border2);color:var(--text);font-weight:600}
/* srcdot = dot indicator inside source button */
.srcdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--text3)}
.srcbtn.ok   .srcdot{background:#22c55e}
.srcbtn.err  .srcdot{background:var(--red)}
.srcbtn.load .srcdot{background:var(--accent);animation:blink 1s infinite}
.srcbtn.on.ok  {border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.07)}
.srcbtn.on.err {border-color:rgba(192,57,43,.5);background:rgba(192,57,43,.07)}
/* legacy .srd alias */
.srd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.src-clear{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:20px;
           border:1px solid var(--border2);color:var(--text3);cursor:pointer;background:none;
           transition:all .15s;white-space:nowrap}
.src-clear:hover{background:var(--red);color:#fff;border-color:var(--red)}
.syp-sbar{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--accent);animation:blink 1.5s infinite;white-space:nowrap}

@media(max-width:640px){
  .hdr-brand,.fbar,.content,.sbar,.settings-panel,.tbar,.srcbar{padding-left:14px;padding-right:14px}
  .logo{font-size:18px}.grid{grid-template-columns:1fr}.persp{grid-template-columns:1fr}
}

/* ── CARD EXPANDED STATE ─────────────────────────────────────────────────── */
.card{transition:box-shadow .15s,border-color .15s}
.card.expanded{border-color:var(--accent)!important;box-shadow:0 4px 20px rgba(0,0,0,.09)!important;transform:none!important;height:auto;overflow:visible}
.card.expanded .ctitle{-webkit-line-clamp:unset;overflow:visible}
[data-theme=dark] .card.expanded{box-shadow:0 4px 20px rgba(0,0,0,.4)!important}

/* Expand section lives inside the card */
.card-expand{margin-top:0;max-height:0;overflow:hidden;
  transition:max-height .4s cubic-bezier(.4,0,.2,1), margin-top .2s ease, padding-top .2s ease;
  border-top:0 solid var(--border)}
.card.expanded .card-expand{max-height:2400px;margin-top:14px;padding-top:14px;border-top-width:1px}

.expand-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--accent2);display:flex;align-items:center;gap:6px;margin-bottom:12px}
.expand-label::after{content:'';flex:1;height:1px;background:var(--accent);opacity:.3}
.expand-summary{font-size:13.5px;line-height:1.75;color:var(--text)}
.expand-skel{display:flex;flex-direction:column;gap:8px}
.expand-skel-line{background:var(--bg2);border-radius:4px;animation:shim 1.4s ease-in-out infinite}
.expand-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.expand-open-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  background:var(--text);color:var(--surface);border:none;border-radius:5px;
  font-family:var(--ui);font-size:12px;font-weight:600;cursor:pointer;
  text-decoration:none;transition:opacity .15s;flex-shrink:0}
.expand-open-btn:hover{opacity:.75}
.expand-close{background:none;border:1px solid var(--border);border-radius:5px;
  padding:7px 12px;font-family:var(--mono);font-size:11px;color:var(--text3);
  cursor:pointer;transition:all .15s}
.expand-close:hover{border-color:var(--border2);color:var(--text)}
.expand-hint{font-family:var(--mono);font-size:10px;color:var(--text3)}
.expand-powered{display:block;margin-top:10px;font-family:var(--mono);font-size:9px;
  color:var(--text3);letter-spacing:.04em;opacity:.7}

@media(max-width:640px){
  .hdr-brand,.fbar,.content,.sbar,.settings-panel,.tbar,.srcbar{padding-left:14px;padding-right:14px}
  .logo{font-size:18px}.grid{grid-template-columns:1fr}.persp{grid-template-columns:1fr}
}

/* ── Rates bar ───────────────────────────────────────────────── */
.rates-bar{display:flex;align-items:center;gap:0;padding:6px 24px;background:var(--surface);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px;overflow-x:auto;scrollbar-width:none;white-space:nowrap;flex-wrap:nowrap}
.rates-bar::-webkit-scrollbar{display:none}
.rate-item{display:flex;align-items:center;gap:5px;color:var(--text2);padding:0 10px}
.rate-label{color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.rate-val{color:var(--text);font-weight:700;font-size:12px}
.rate-chg{font-size:11px;padding:1px 5px;border-radius:4px;font-weight:600}
.rate-chg.up{color:#16a34a;background:rgba(22,163,74,.1)}
.rate-chg.dn{color:#dc2626;background:rgba(220,38,38,.1)}
.rate-chg.flat{color:var(--text3)}
.rate-dot{color:var(--border2);padding:0 4px;font-size:14px;line-height:1}
.rates-ts{margin-left:auto;padding-left:16px;color:var(--text3);font-size:10px;white-space:nowrap}

/* ── Siri-style AI widget ─────────────────────────────────────── */
@property --siri-angle {
  syntax: "<angle>";
  initial-value: 0deg;
  inherits: false;
}
@keyframes siri-spin { to { --siri-angle: 360deg; } }
@keyframes siri-pulse { 0%,100%{opacity:.7} 50%{opacity:1} }
@keyframes siri-appear { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
@keyframes dot-wave { 0%,80%,100%{transform:scaleY(0.4);opacity:.4} 40%{transform:scaleY(1);opacity:1} }

.siri-wrap {
  margin: 16px 24px 0;
  position: relative;
  border-radius: 20px;
  animation: siri-appear .4s ease both;
}
.siri-wrap::before {
  content:"";
  position:absolute;inset:-2px;
  border-radius:22px;
  background: conic-gradient(from var(--siri-angle),
    #3b82f6, #8b5cf6, #ec4899, #f59e0b, #10b981, #3b82f6);
  animation: siri-spin 3s linear infinite, siri-pulse 2s ease-in-out infinite;
  z-index:0;
}
.siri-wrap.idle::before { animation: none; opacity: 0; }
.siri-inner {
  position:relative;z-index:1;
  border-radius:19px;
  background: var(--surface);
  overflow:hidden;
}
.siri-head {
  display:flex;align-items:center;gap:10px;
  padding:12px 18px;cursor:pointer;
  user-select:none;
}
.siri-head:hover .siri-title { opacity:.8; }
.siri-orb {
  width:28px;height:28px;flex-shrink:0;
  border-radius:50%;
  background: conic-gradient(from 0deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  animation: siri-spin 4s linear infinite;
}
.siri-wrap.idle .siri-orb { animation:none; background: var(--bg2); }
.siri-title {
  font-family:var(--head);font-size:12px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--text2);flex:1;
}
.siri-badge {
  font-size:11px;font-weight:700;padding:3px 10px;
  border-radius:20px;font-family:var(--mono);
}
.siri-badge.tense  { background:rgba(236,72,153,.12); color:#ec4899; }
.siri-badge.alarm  { background:rgba(220,38,38,.12);  color:#dc2626; }
.siri-badge.calm   { background:rgba(16,185,129,.12); color:#10b981; }
.siri-badge.mixed  { background:rgba(245,158,11,.12); color:#d97706; }
.siri-badge.neutral{ background:var(--bg2); color:var(--text3); }
.siri-chevron { color:var(--text3);font-size:11px;transition:transform .2s; }
.siri-body {
  max-height:0;overflow:hidden;
  transition:max-height .35s cubic-bezier(.4,0,.2,1), padding .25s;
  font-size:14px;line-height:1.7;color:var(--text);
  padding:0 18px;
}
.siri-body.open { max-height:400px; padding:0 18px 16px; }
.siri-body p { margin:5px 0; }
.siri-body b { color:var(--text); }
.siri-loading {
  display:flex;align-items:center;gap:6px;
  padding:12px 18px;font-size:12px;color:var(--text3);font-family:var(--mono);
}
.siri-dots { display:flex;gap:3px;align-items:center; }
.siri-dots span {
  display:block;width:3px;height:14px;border-radius:2px;
  background:linear-gradient(to top,#3b82f6,#8b5cf6);
  animation: dot-wave 1.2s ease-in-out infinite;
}
.siri-dots span:nth-child(2){animation-delay:.15s}
.siri-dots span:nth-child(3){animation-delay:.3s}
.siri-dots span:nth-child(4){animation-delay:.45s}
.siri-dots span:nth-child(5){animation-delay:.6s}
.siri-no-key {
  padding:10px 18px 14px;font-size:13px;color:var(--text3);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.siri-setup-btn {
  font-size:12px;padding:4px 12px;border-radius:16px;
  border:1px solid var(--border2);background:none;
  cursor:pointer;color:var(--text2);font-family:var(--mono);
}
.siri-setup-btn:hover{background:var(--bg2)}
.siri-regen {
  margin-left:auto;font-size:11px;padding:3px 10px;
  border-radius:16px;border:1px solid var(--border);
  background:none;cursor:pointer;color:var(--text3);
  font-family:var(--mono);
}
.siri-regen:hover{color:var(--text2)}

/* ── Model toggle in settings ─────────────────────────────────── */
.model-row { display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 0; }
.model-toggle { display:flex;background:var(--bg);border:1px solid var(--border);border-radius:24px;padding:3px;gap:2px; }
.model-pill { padding:5px 13px;border-radius:20px;font-size:12px;font-family:var(--mono);font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);transition:all .18s; }
.model-pill.active { background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1); }
.model-pill:hover:not(.active){color:var(--text2)}
.model-key-row { display:none;align-items:center;gap:8px;flex-wrap:wrap;padding:6px 0; }
.model-key-row.vis { display:flex; }
.model-key-hint { font-size:11px;color:var(--text3);font-family:var(--mono); }
.model-key-hint a { color:var(--accent2,#b8971f);text-decoration:none; }
.model-status-ok  { font-size:11px;color:#16a34a;font-family:var(--mono); }
.model-status-err { font-size:11px;color:#dc2626;font-family:var(--mono); }
.settings-divider { border:none;border-top:1px solid var(--border);margin:6px 0; }


/* ── AI Chat widget ──────────────────────────────────── */
.chat-wrap {
  margin: 12px 24px 0;
  position: relative;
  border-radius: 18px;
  animation: siri-appear .4s ease both;
}
.chat-wrap::before {
  content: "";
  position: absolute; inset: -2px;
  border-radius: 20px;
  background: conic-gradient(from var(--siri-angle),
    #3b82f6, #8b5cf6, #ec4899, #f59e0b, #10b981, #3b82f6);
  animation: siri-spin 3s linear infinite, siri-pulse 2s ease-in-out infinite;
  z-index: 0;
}
.chat-inner {
  position: relative; z-index: 1;
  border-radius: 17px;
  background: var(--surface);
  overflow: hidden;
}
.chat-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px; cursor: pointer; user-select: none;
}
.chat-head:hover .chat-title { opacity: .8; }
.chat-icon {
  width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%;
  background: var(--bg2); display: flex; align-items: center;
  justify-content: center; font-size: 14px;
}
.chat-title {
  font-family: var(--head); font-size: 12px; font-weight: 800;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text2); flex: 1;
}
.chat-chevron { color: var(--text3); font-size: 11px; transition: transform .2s; }
.chat-body { max-height: 0; overflow: hidden; transition: max-height .35s cubic-bezier(.4,0,.2,1); }
.chat-body.open { max-height: 600px; }
.chat-messages {
  padding: 0 16px 8px; max-height: 340px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.chat-msg {
  display: flex; gap: 8px; align-items: flex-start;
}
.chat-msg.user { flex-direction: row-reverse; }
.chat-bubble {
  max-width: 80%; padding: 8px 13px; border-radius: 14px;
  font-size: 13px; line-height: 1.55; word-break: break-word;
}
.chat-msg.user .chat-bubble {
  background: var(--text); color: var(--surface);
  border-bottom-right-radius: 4px;
}
.chat-msg.ai .chat-bubble {
  background: var(--bg2); color: var(--text);
  border-bottom-left-radius: 4px;
}
.chat-msg.ai .chat-bubble.loading {
  color: var(--text3); font-style: italic; font-size: 12px;
}
.chat-input-row {
  display: flex; gap: 8px; align-items: flex-end;
  padding: 10px 16px 14px; border-top: 1px solid var(--border);
  background: var(--surface);
}
.chat-input {
  flex: 1; padding: 8px 12px; border-radius: 20px;
  border: 1px solid var(--border2); background: var(--bg);
  color: var(--text); font-family: var(--body); font-size: 13px;
  resize: none; outline: none; max-height: 100px; min-height: 36px;
  line-height: 1.4; transition: border-color .15s;
}
.chat-input:focus { border-color: var(--accent2, #b8971f); }
.chat-send {
  width: 34px; height: 34px; flex-shrink: 0; border-radius: 50%;
  background: var(--text); color: var(--surface); border: none;
  cursor: pointer; font-size: 15px; display: flex;
  align-items: center; justify-content: center;
  transition: opacity .15s; flex-shrink: 0;
}
.chat-send:disabled { opacity: .35; cursor: default; }
.chat-send:hover:not(:disabled) { opacity: .8; }
.chat-no-key {
  padding: 12px 16px 14px; font-size: 13px; color: var(--text3);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}


/* Translated link indicator */
.expand-open-btn[href*="translate.google.com"]::after {
  content: " 🌐";
  font-size: 10px;
  opacity: .7;
}


/* Expand body scrollable for long translated articles */
#content .card.expanded [id^="expand-body-"] {
  max-height: 600px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  padding-right: 4px;
}


/* New card badge */
.card-new-badge {
  display: inline-flex; align-items: center;
  background: var(--accent); color: #fff;
  font-size: 9px; font-weight: 800; letter-spacing: .06em;
  padding: 2px 5px; border-radius: 3px; margin-left: 4px;
  vertical-align: middle; animation: pulse-new 2s ease infinite;
}
@keyframes pulse-new {
  0%,100% { opacity: 1; } 50% { opacity: .6; }
}
/* Clear storage button in refresh area */
.clear-cache-btn {
  font-size: 11px; color: var(--text3); background: none;
  border: 1px solid var(--border2); border-radius: 4px;
  padding: 3px 8px; cursor: pointer; font-family: var(--ui);
}
.clear-cache-btn:hover { color: var(--text); border-color: var(--text3); }


/* Bloomberg widget */
.blmb-wrap {
  margin: 12px 24px 0;
  background: var(--bg2);
  border: 1px solid #1a3a5c;
  border-radius: 12px;
  overflow: hidden;
}
.blmb-head {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; cursor: pointer;
  user-select: none;
}
.blmb-head:hover { background: rgba(255,255,255,.03); }
.blmb-logo {
  font-size: 11px; font-weight: 800; letter-spacing: .08em;
  color: #2d8cf0; text-transform: uppercase; font-family: var(--ui);
}
.blmb-count {
  font-size: 10px; color: var(--text3); flex: 1;
}
.blmb-chevron {
  font-size: 10px; color: var(--text3); transition: transform .2s;
}
.blmb-wrap.open .blmb-chevron { transform: rotate(90deg); }
.blmb-body {
  padding: 0 10px 8px;
  max-height: 340px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.blmb-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 4px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.blmb-item:last-child { border-bottom: none; }
.blmb-item:hover .blmb-title { color: var(--accent2); }
.blmb-time {
  font-size: 9px; color: var(--text3); white-space: nowrap;
  min-width: 32px; padding-top: 2px; font-family: var(--ui);
}
.blmb-title {
  font-size: 12px; line-height: 1.4; color: var(--text);
  transition: color .15s;
}
.blmb-title a {
  color: inherit; text-decoration: none;
}
.blmb-title a:hover { color: var(--accent2); }



/* PWA: prevent iOS zoom on input focus */
.chat-input, input[type="text"], input[type="search"], textarea {
  font-size: 16px !important;  /* iOS won't zoom if font-size >= 16px */
  transform-origin: left top;
}
.fstatus{font-family:var(--mono);font-size:10px;color:var(--accent);margin-left:6px;white-space:nowrap;animation:blink 1.5s infinite}

function formatTime(d) {
  if (!d) return "—";
  const m = Math.round((Date.now()-d)/60000);
  if (m < 1)  return "только что";
  if (m < 60) return `${m} мин назад`;
  const h = Math.round(m/60);
  if (h < 24) return `${h} ч назад`;

// ── FALLBACK categorizer (no API key) ───────────────────────────────────────
// "local" is NEVER assigned here — only tag-based sources can ever be local
function categorizeFallback(title, desc) {
  const t = (title + " " + desc).toLowerCase();
  if (KW.geopolitics.include.test(t) && !KW.geopolitics.exclude.test(t)) return "geopolitics";
  if (KW.finance.include.test(t)     && !KW.finance.exclude.test(t))     return "finance";
  if (KW.tech.include.test(t)        && !KW.tech.exclude.test(t))        return "tech";
  return "lifestyle";  // sport, culture, crime, health — everything else
}

"finance"      — экономика и деньги: биржи, курсы валют, ЦБ, ставки, нефть/газ как товар, отчёты компаний, крипто, сделки M&A, тарифы, ВВП, инфляция.
"tech"         — технологии: ИИ, ПО, железо, стартапы, кибербезопасность, космос, электромобили, биотех.
"lifestyle"    — всё остальное: спорт, культура, криминал, здоровье, общество, люди, погода, ДТП, ЖКХ.

Ответь ТОЛЬКО JSON-массивом, порядок сохрани:
[{"i":0,"cat":"finance"},{"i":1,"cat":"lifestyle"},...]`;

async function classifyBatch(items, apiKey) {
  const lines = items.map((it, i) =>
    `${i}. [${it.sourceName}] ${it.title}: ${it.description.slice(0, 120)}`
  ).join("\n");
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 600,
        messages: [{ role: "user", content: CAT_PROMPT + "\n\nСтатьи:\n" + lines }],
      }),
      signal: AbortSignal.timeout(20000),
    });
    if (!res.ok) return null;
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || "").join("");
    const m = text.match(/\[[\s\S]*?\]/);
    if (!m) return null;
    return JSON.parse(m[0]);
  } catch { return null; }
}

async function categorizeWithAI(rawItems, apiKey) {
  // ── STEP 1: local items come ONLY from tagged sources, never from AI ──────
  const localItems    = rawItems.filter(it => it.tag);    // YarNews + Москва24 only
  const nonLocalItems = rawItems.filter(it => !it.tag);   // everything else → AI

  const BATCH = 15;
  const catMap = {};

  for (let i = 0; i < nonLocalItems.length; i += BATCH) {
    const batch  = nonLocalItems.slice(i, i + BATCH);
    const result = await classifyBatch(batch, apiKey);
    if (result) {
      result.forEach(r => { catMap[i + r.i] = r.cat; });
    } else {
      batch.forEach((it, bi) => {
        catMap[i + bi] = categorizeFallback(it.title, it.description);
      });
    }
  }

  const classified = nonLocalItems.map((it, idx) => {
    const cat = catMap[idx];
    // Hard block: if AI somehow returns "local" — discard entirely
    if (!cat || cat === "lifestyle" || cat === "local") return null;
    return { ...it, cat };
  }).filter(Boolean);

  // ── STEP 2: local items are returned as-is, never re-classified ───────────
  return [...localItems, ...classified];
}

// Words that signal the article is NOT a local city story
const NATIONAL_KW = /украин|ukraine|нато|nato|трамп|trump|байден|biden|путин|putin|китай|china|иран|iran|израил|israel|сша|usa|газпром|госдума|федераль|минфин|минобороны|центробанк|президент|правительство рф|кремль|kremlin|sanctions|санкц|missile|ракет.*удар|обстрел|наступлен|биткоин|bitcoin|нефть.*цен|brent|доллар.*курс|курс.*доллар|ввп|gdp|инфляц|ставк.*цб|цб.*ставк/i;

// Words that confirm article IS about the city
const YAROSLAVL_KW = /ярославл|ярослав|ярославск|рыбинск|углич|переславл|тутаев|ростов велик/i;
const MOSCOW_KW    = /москв|московск|мэрия|собянин|mos\.ru|троицк|зеленоград|новая москва/i;

function isLocalArticle(title, desc, tag) {
  const t = (title + " " + desc).toLowerCase();

  // Reject if clearly national/international topic
  if (NATIONAL_KW.test(t)) return false;

  // Must mention the city name (or nearby cities)
  if (tag === "Ярославль") return YAROSLAVL_KW.test(t);
  if (tag === "Москва")    return MOSCOW_KW.test(t);

  return false; // unknown tag → discard
}

// Try ONE proxy+url combo — returns xml string or null
async function tryOne(proxyObj, sourceUrl, timeout) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), timeout);
  try {
    const res = await fetch(proxyObj.fn(sourceUrl), { signal: ctrl.signal });
    clearTimeout(tid);
    if (!res.ok) return null;

    if (proxyObj.type === "rss2json") {
      const json = await res.json();
      if (json.status !== "ok" || !json.items?.length) return null;
      const xmlItems = json.items.map(it => `<item><title><![CDATA[${it.title||""}]]></title><description><![CDATA[${it.description||it.content||""}]]></description><link>${it.link||""}</link><pubDate>${it.pubDate||""}</pubDate></item>`).join("");
      return `<?xml version="1.0"?><rss><channel>${xmlItems}</channel></rss>`;
    }

    const ct   = res.headers.get("content-type") || "";
    const text = ct.includes("json") ? (await res.json()).contents || "" : await res.text();
    return (text && text.length > 100) ? text : null;
  } catch { clearTimeout(tid); return null; }
}

// Race ALL proxy×url combos simultaneously — first valid response wins
async function fetchSource(src) {
  const urlList = src.urls || [src.url];

  // ── Special: Jina scraper for JS-heavy sites (JINA: prefix) ─────────────
  if (urlList.some(u => u.startsWith("JINA:"))) {
    const targetUrl = urlList.find(u => u.startsWith("JINA:")).slice(5);
    const out = [];
    try {
      const res = await Promise.race([
        fetch("https://r.jina.ai/" + targetUrl, {
          headers: { "X-Timeout": "12", "Accept": "text/plain" }
        }),
        new Promise((_,r) => setTimeout(() => r(new Error("to")), 14000))
      ]);
      if (res.ok) {
        const text = await res.text();
        const seen = new Set();
        let count = 0;
        for (const line of text.split("\n")) {
          if (count >= 20) break;
          const m = line.match(/\[([^\]]{10,150})\]\((https:\/\/dropscapital\.com[^)]+)\)/);
          if (!m) continue;
          const [, title, link] = m;
          if (seen.has(link) || title.length < 10) continue;
          seen.add(link);
          out.push({
            title: title.trim(), description: title.trim(), link,
            date: new Date(Date.now() - count * 3600000),
            cat: src.cat || "finance",
            sourceName: src.name, sourceCountry: src.country,
            tag: null, isTg: false
          });
          count++;
        }
      }
    } catch(e) { /* Jina unavailable */ }
    return out;
  }
  // ─────────────────────────────────────────────────────────────────────────

  const TIMEOUT = 7000;

  const races = [];
  for (const u of urlList) {
    for (const proxy of PROXIES) {
      races.push(tryOne(proxy, u, TIMEOUT));
    }
  }

  // Promise.any: resolves with first non-null, rejects if all fail
  const xml = await Promise.any(
    races.map(p => p.then(v => v ?? Promise.reject("null")))
  ).catch(() => null);

  if (!xml) return [];


  try {
    const doc  = new DOMParser().parseFromString(xml, "text/xml");
    const els  = doc.querySelectorAll("item, entry");
    const out  = [];
    let idx = 0;
    els.forEach(el => {
      if (idx++ >= 50) return;
      const title = strip(cdata(el.querySelector("title")?.textContent));
      const desc  = strip(cdata(
        el.querySelector("description")?.textContent ||
        el.querySelector("content")?.textContent || ""
      )).slice(0,350);
      const link  = (el.querySelector("link")?.textContent?.trim() ||
                     el.querySelector("link")?.getAttribute("href") || "").trim();
      const rawDate = el.querySelector("pubDate,published,updated")?.textContent;
      const date = rawDate ? new Date(rawDate) : new Date();
      if (!title || title.length < 5) return;
      // Tagged sources (YarNews / Москва24): ONLY keep articles that are
      // genuinely about that city — drop anything national/international
      if (src.tag) {
        const isLocalContent = isLocalArticle(title, desc, src.tag);
        if (!isLocalContent) return; // discard silently
      }
      const cat = src.tag ? "local" : "pending";
      // Filter out articles older than maxAgeDays (for sources like RBC with pinned pages)
      if (src.maxAgeDays) {
        const maxMs = src.maxAgeDays * 24 * 60 * 60 * 1000;
        if (Date.now() - date.getTime() > maxMs) return;
      }
      out.push({ title, description:desc, link, date, cat,
        sourceName:src.name, sourceCountry:src.country, tag:src.tag||null });
    });
    return out;
  } catch { return []; }
}

// ═══════════════════════════════════════════════════════════

function tokenSet(s) {
  const clean = s.toLowerCase()
    .replace(/[«»""„‟]/g," ")
    .replace(/[^а-яёa-z0-9]/gi," ")
    .replace(/\b(сообщает|сообщил|заявил|рассказал|объявил|тасс|риа|reuters|bloomberg|afp)\b/g," ");
  return new Set(clean.split(/\s+/).filter(w => w.length > 3));
}
function jaccard(a, b) {
  const sa=tokenSet(a), sb=tokenSet(b);
  let inter=0; sa.forEach(t=>{ if(sb.has(t)) inter++; });
  const union=sa.size+sb.size-inter;
  return union ? inter/union : 0;
}
function groupArticles(items) {
  const groups=[], used=new Set();
  for (let i=0; i<items.length; i++) {
    if (used.has(i)) continue;
    const g=[items[i]]; used.add(i);
    for (let j=i+1; j<items.length; j++) {
      if (used.has(j)) continue;
      if (jaccard(items[i].title, items[j].title) >= 0.35) { g.push(items[j]); used.add(j); }
    }
    groups.push(g);
  }
  return groups;
}

function makeCard(group) {
  const p = group[0];
  const sources = [...new Set(group.map(g=>g.sourceName))];
  const ru   = group.filter(g=>g.sourceCountry==="ru");
  const west = group.filter(g=>g.sourceCountry==="west");
  // needsTranslation: card has at least one western article AND no Russian counterpart
  const needsTranslation = west.length > 0 && ru.length === 0;
  return {
    id: Math.random().toString(36).slice(2),
    title: p.title,
    summary: p.description || p.title,
    // Translation fields — filled by translateCards()
    title_ru: needsTranslation ? null : p.title,
    summary_ru: needsTranslation ? null : decodeEntities(p.description || p.title || ""),
    title_en: null,   // filled lazily when switching to EN
    summary_en: null,
    needsTranslation,
    cat: p.cat, tag: p.tag, sources, link: p.link, date: p.date,
    time: formatTime(p.date),
    perspectives: (ru.length && west.length) ? {
      russian: ru[0].description?.slice(0,160) || null,
      western: west[0].description?.slice(0,160) || null,
    } : null,
    synthesized: false,
    raw: group,
  };
}

// AI SYNTHESIS (optional, needs API key)

async function synthesize(card) {
  if (!"" || card.raw.length < 2) return card;

  const ru   = card.raw.filter(i=>i.sourceCountry==="ru");
  const west = card.raw.filter(i=>i.sourceCountry==="west");
  const both = ru.length>0 && west.length>0;
  const snips = card.raw.map(i=>`[${i.sourceName}] ${i.title}: ${i.description.slice(0,200)}`).join("\n");
  const pf = both
    ? `"perspectives":{"russian":"мнение рос.СМИ 1-2 пред","western":"мнение зап.СМИ 1-2 пред"}`
    : `"perspectives":null`;

  const prompt = `Объедини эти новости об одном событии. Только JSON без markdown:\n{"title":"до 80 символов","summary":"2-3 предложения",${pf}}\n\n${snips}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({ model:"claude-haiku-4-5-20251001", max_tokens:350,
        messages:[{role:"user",content:prompt}] }),
      signal: AbortSignal.timeout(15000),
    });
    if (!res.ok) return card;
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||"").join("");
    const m = text.match(/\{[\s\S]*?\}/);
    if (!m) return card;
    const p = JSON.parse(m[0]);
    return { ...card, title:p.title||card.title, summary:p.summary||card.summary,
      perspectives:p.perspectives||card.perspectives, synthesized:true };
  } catch { return card; }
}

const STORE_KEY   = "mmsaww_cards_v2";
const STORE_MAX_H = 48;   // keep cards up to 48 hours

function saveCards(cards) {
  try {
    const payload = cards.map(c => ({
      id: c.id, title: c.title, title_ru: c.title_ru,
      summary: c.summary, summary_ru: c.summary_ru,
      cat: c.cat, tag: c.tag, sources: c.sources, link: c.link,
      date: c.date?.toISOString?.() || c.date,
      time: c.time, needsTranslation: c.needsTranslation,
      synthesized: c.synthesized, firstSeen: c.firstSeen || Date.now(),
      raw: (c.raw||[]).map(r=>({
        title: r.title, description: r.description,
        link: r.link, sourceName: r.sourceName,
        sourceCountry: r.sourceCountry, tag: r.tag
      }))
    }));
    localStorage.setItem(STORE_KEY, JSON.stringify(payload));
  } catch(e) { /* quota exceeded — silently ignore */ }
}

// Sources removed from the app — purge their cards from cache
const DEAD_SOURCES = new Set(["WSJ","FT","Bloomberg","Reuters","DropsCapital"]);

function loadStoredCards() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return [];
    const cutoff = Date.now() - STORE_MAX_H * 3600000;
    return JSON.parse(raw)
      .filter(c => {
        const d = new Date(c.date).getTime();
        if (isNaN(d) || d <= cutoff) return false;
        // Drop card if ALL its sources are dead
        const srcs = c.sources || [];
        if (srcs.length > 0 && srcs.every(s => DEAD_SOURCES.has(s))) return false;
        return true;
      })
      .map(c => ({
        ...c,
        date: new Date(c.date),
        perspectives: null,
        // Strip dead sources from mixed-source cards
        sources: (c.sources || []).filter(s => !DEAD_SOURCES.has(s)),
      }));
  } catch(e) { return []; }
}


const READ_KEY = "mmsaww_read_v1";

function getReadSet() {
  try { return new Set(JSON.parse(localStorage.getItem(READ_KEY) || "[]")); }
  catch(e) { return new Set(); }
}

function markCardRead(link) {
  if (!link) return;
  const s = getReadSet();
  s.add(link);
  // Keep only last 500 read links to avoid bloat
  const arr = [...s].slice(-500);
  try { localStorage.setItem(READ_KEY, JSON.stringify(arr)); } catch(e) {}
}

function isReadCard(link) {
  if (!link) return false;
  return getReadSet().has(link);
}

function mergeWithStored(freshCards) {
  const stored = loadStoredCards();
  const cutoff  = Date.now() - STORE_MAX_H * 3600000;
  const now     = Date.now();
  const NEW_THRESHOLD = 15 * 60 * 1000;  // 15 min = "new" badge

  // Build lookup by primary link
  const byLink = new Map();
  stored.forEach(c => {
    const key = (c.link || c.id || "").toLowerCase();
    if (key) byLink.set(key, c);
    // Also index by all raw links
    (c.raw||[]).forEach(r => {
      if (r.link) byLink.set(r.link.toLowerCase(), c);
    });
  });

  const merged = [...stored];

  for (const card of freshCards) {
    const key = (card.link || "").toLowerCase();
    // Check if any raw link matches stored
    const rawLinks = (card.raw||[]).map(r => (r.link||"").toLowerCase()).filter(Boolean);
    const exists = byLink.has(key) || rawLinks.some(l => byLink.has(l));
    if (!exists) {
      // Brand new card
      card.firstSeen = now;
      card.isNew = !isReadCard(card.link);  // only new if not already read
      merged.push(card);
      // Index it
      if (key) byLink.set(key, card);
      rawLinks.forEach(l => byLink.set(l, card));
    } else {
      // Existing card — update sources list if new source joined the cluster
      const existing = byLink.get(key) || byLink.get(rawLinks[0]);
      if (existing) {
        const newSrcs = (card.sources||[]).filter(s => !(existing.sources||[]).includes(s));
        if (newSrcs.length) existing.sources = [...(existing.sources||[]), ...newSrcs];
        // Update isNew status based on read state
        existing.isNew = !isReadCard(existing.link);
      }
    }
  }

  // Prune old cards + sort
  return merged
    .filter(c => new Date(c.date).getTime() > cutoff)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
}

function clearStoredCards() {
  try { localStorage.removeItem(STORE_KEY); } catch(e) {}
  state.cards = [];
  renderContent();
}

async function loadAll() {
  const run = ++state.runId;
  state.cards = [];
  state.bloombergItems = state.bloombergItems || [];
  state.loading = true;
  state.synthCount = 0;
  state.synthTotal = 0;
  state.srcStatus = {};

  SOURCES.forEach(s => { state.srcStatus[s.name] = "load"; });
  renderHeader();
  renderStatusBar();
  renderContent();
  setRefreshState(true);

  // Fetch all RSS in parallel
  const results = await Promise.all(
    SOURCES.map(async src => {
      const items = await fetchSource(src);
      if (run !== state.runId) return [];
      state.srcStatus[src.name] = items.length ? "ok" : "err";
      renderStatusBar();
      return items;
    })
  );

  if (run !== state.runId) return;

  state.loading = false;
  state.lastUpdated = new Date();
  setRefreshState(false);

  const allItems = results.flat().filter(it => {
    const src = SOURCES.find(s => s.name === it.sourceName);
    if (src?.bloombergOnly) {
      // Stash bloomberg items separately, don't add to main feed
      state.bloombergItems = state.bloombergItems || [];
      if (!state.bloombergItems.find(x => x.link === it.link)) {
        state.bloombergItems.push(it);
      }
      return false;
    }
    return true;
  });
  state.bloombergItems = (state.bloombergItems || [])
    .sort((a,b) => b.date - a.date)
    .slice(0, 30);
  renderBloombergWidget();
  // Translate Bloomberg titles to Russian in background
  if (state.lang === "ru") {
    (state.bloombergItems || []).forEach(async it => {
      if (!it.title_ru && it.title) {
        const tr = await gtranslate(it.title, "ru");
        if (tr) { it.title_ru = tr; renderBloombergWidget(); }
      }
    });
  }

  // ── Global title dedup: remove near-identical headlines across sources
  const _dedupSeen = new Map();
  const dedupedItems = allItems.filter(it => {
    const key = (it.title||"").toLowerCase().replace(/[^а-яёa-z0-9]/gi,"").slice(0,60);
    if (_dedupSeen.has(key)) return false;
    _dedupSeen.set(key, true);
    return true;
  });

  // ── Categorize: AI if key available, else fallback regex ──────────────────
  let categorized;
  {
    // No API key: local = tagged sources only, others get regex fallback
    const localFallback    = dedupedItems.filter(it => it.tag);
    const nonLocalFallback = dedupedItems.filter(it => !it.tag);
    const classifiedFallback = nonLocalFallback.map(it => {
      const cat = categorizeFallback(it.title, it.description);
      return cat ? { ...it, cat } : null;
    }).filter(Boolean);
    categorized = [...localFallback, ...classifiedFallback];
  }

  // Group + dedup
  const byCat = {};
  CATEGORIES.filter(c=>c.id!=="all").forEach(c=>{ byCat[c.id]=[]; });
  categorized.forEach(it => { if (byCat[it.cat]) byCat[it.cat].push(it); });
  Object.values(byCat).forEach(arr => arr.sort((a,b)=>b.date-a.date));

  const raw = [];
  Object.entries(byCat).forEach(([,items]) => {
    groupArticles(items).slice(0,20).forEach(g => raw.push(makeCard(g)));
  });
  raw.sort((a,b) => b.date-a.date);

  // ── Persist + merge with stored cards ────────────────────────────────────
  state.cards = mergeWithStored(raw);
  saveCards(state.cards);
  renderHeader();
  renderTicker();
  renderContent();

  // Background RU translation — Claude Haiku if key, Google Translate otherwise
  translateCards(state.cards, "ru", "");

  // AI Siri sentiment — after cards loaded
  state.sentimentDone = false;
  triggerSentiment();


}

// Translate a batch of {title, summary} objects → returns [{title_ru, summary_ru}, ...]
async function translateBatch(items, targetLang, apiKey) {
  const dir = targetLang === "ru"
    ? "Переведи на русский язык. Перевод должен звучать естественно, как написанный носителем языка."
    : "Translate to English. The translation should sound natural, as if written by a native speaker.";

  const lines = items.map((it, i) =>
    `${i}|TITLE|${it.title}
${i}|SUMMARY|${it.summary}`
  ).join("\n");

  const prompt = `${dir}

Ответь ТОЛЬКО в формате:
0|TITLE|перевод заголовка
0|SUMMARY|перевод описания
1|TITLE|...
и т.д.

Не добавляй ничего лишнего. Каждая строка начинается с номера.

Тексты:
${lines}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 2000,
        messages: [{ role: "user", content: prompt }],
      }),
      signal: AbortSignal.timeout(30000),
    });
    if (!res.ok) return null;
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || "").join("");

    // Parse response lines
    const result = items.map(() => ({ title: null, summary: null }));
    text.split("\n").forEach(line => {
      const m = line.match(/^(\d+)\|(TITLE|SUMMARY)\|(.+)$/);
      if (!m) return;
      const [, idx, field, val] = m;
      const i = parseInt(idx);
      if (i < result.length) {
        if (field === "TITLE")   result[i].title   = val.trim();
        if (field === "SUMMARY") result[i].summary = val.trim();
      }
    });
    return result;
  } catch { return null; }
}

// Free Google Translate fallback (no API key needed)
async function gtranslate(text, targetLang) {
  if (!text) return text;
  const sl = targetLang === "ru" ? "en" : "ru";
  const tl = targetLang;
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text.slice(0, 1000))}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) return null;
    const data = await res.json();
    // Response: [[["translated","original",...], ...], ...]
    const translated = (data[0] || []).map(chunk => chunk[0] || "").join("");
    return translated || null;
  } catch { return null; }
}

async function translateCards(cards, targetLang, apiKey) {
  const fieldT = targetLang === "ru" ? "title_ru"   : "title_en";
  const fieldS = targetLang === "ru" ? "summary_ru"  : "summary_en";

  const toTranslate = cards.filter(c => {
    if (targetLang === "ru") return c.needsTranslation && !c.title_ru;
    if (targetLang === "en") return !c.title_en;
    return false;
  });

  if (!toTranslate.length) return;

  state.translating = true;
  renderStatusBar();

  if (apiKey) {
    // ── Claude Haiku: batch translation (high quality) ──────────────────────
    const BATCH = 8;
    for (let i = 0; i < toTranslate.length; i += BATCH) {
      const batch = toTranslate.slice(i, i + BATCH);
      const result = await translateBatch(
        batch.map(c => ({ title: c.title, summary: c.summary })),
        targetLang, apiKey
      );
      if (result) {
        batch.forEach((card, bi) => {
          const r = result[bi];
          if (r?.title)   card[fieldT] = r.title;
          if (r?.summary) card[fieldS] = r.summary;
        });
      } else {
        // Claude failed — fall back to Google for this batch
        await Promise.all(batch.map(async card => {
          const [t, s] = await Promise.all([
            gtranslate(card.title, targetLang),
            gtranslate(card.summary, targetLang),
          ]);
          if (t) card[fieldT] = t;
          if (s) card[fieldS] = s;
        }));
      }
      renderContent();
    }
  } else {
    // ── Google Translate: free, parallel per card ───────────────────────────
    const CONCURRENT = 5; // don't hammer Google
    for (let i = 0; i < toTranslate.length; i += CONCURRENT) {
      const batch = toTranslate.slice(i, i + CONCURRENT);
      await Promise.all(batch.map(async card => {
        const [t, s] = await Promise.all([
          gtranslate(card.title, targetLang),
          gtranslate(card.summary, targetLang),
        ]);
        if (t) card[fieldT] = t;
        if (s) card[fieldS] = s;
      }));
      renderContent(); // show progress as each batch finishes
    }
  }

  state.translating = false;
  renderStatusBar();
}

  const newLang = state.lang === "ru" ? "en" : "ru";

// ── Filter helpers ───────────────────────────────────────────────────────────
function visibleCards(allCards) {
  let cards = allCards;
  if (state.timeFilter === "today") {
    // Today: from 00:00 today to 23:59 today
    const start = new Date(); start.setHours(0,0,0,0);
    const end   = new Date(); end.setHours(23,59,59,999);
    cards = cards.filter(c => c.date >= start && c.date <= end);
  } else if (state.timeFilter === "prev") {
    // Yesterday and earlier: anything before today 00:00
    const cutoff = new Date(); cutoff.setHours(0,0,0,0);
    cards = cards.filter(c => c.date < cutoff);
  }
  // "all" (default on load) = no date filter — show everything
  if (state.srcFilter.size > 0) {
    cards = cards.filter(c => c.sources && c.sources.some(s => state.srcFilter.has(s)));
  }
  if (state.pressFilt === "ru") {
    const ruSet = new Set(SOURCES.filter(s => s.country === "ru").map(s => s.name));
    cards = cards.filter(c => (c.sources || []).some(s => ruSet.has(s)));
  } else if (state.pressFilt === "west") {
    const westSet = new Set(SOURCES.filter(s => s.country === "west").map(s => s.name));
    cards = cards.filter(c => (c.sources || []).some(s => westSet.has(s)));
  }
  return cards;
}
function setPressFilt(val) {
  state.pressFilt = val;
  ["all","ru","west"].forEach(v => {
    const b = document.getElementById("pfbtn-" + v);
    if (b) b.classList.toggle("on", v === val);
  });
  renderContent();
}

function setTimeFilter(val) {

function renderContent() {
  const el = document.getElementById("content");

  if (state.loading && state.cards.length===0) {
    el.innerHTML = `<div class="grid">${[1,2,3,4,5,6].map(()=>skelHTML()).join("")}</div>`;
    return;
  }

  if (!state.loading && state.cards.length===0) {
    const errored = SOURCES.filter(s=>state.srcStatus[s.name]==="err").map(s=>s.name);
    el.innerHTML = `<div class="msg-box">
      <div class="msg-title">Нет данных</div>
      <div class="msg-text">
        Не удалось загрузить новости через CORS-прокси.<br>
        Не прошли источники: ${errored.length ? errored.join(", ") : "все"}<br><br>
        Попробуйте нажать «Обновить» — прокси иногда восстанавливаются.<br>
        Или откройте файл через локальный сервер (npx serve .).
      </div>
      <button class="rbtn" onclick="loadAll()">↻ Повторить</button>
    </div>`;
    return;
  }

  // Grouped "all" view
  if (state.filter === "all") {
    let html = "";
    CATEGORIES.filter(c=>c.id!=="all").forEach(cat => {
      const items = visibleCards(state.cards).filter(x=>x.cat===cat.id);
      html += `<div>
        <div class="sec-hdr">
          <span class="sdot" style="background:${cat.color}"></span>
          <span class="slbl">${cat.label}</span>
          <div class="sline"></div>
          <span class="scnt">${items.length}</span>
        </div>`;
      if (items.length===0) {
        html += state.loading
          ? `<div class="grid">${[1,2,3].map(()=>skelHTML()).join("")}</div>`
          : `<div class="empty">нет данных по этой теме</div>`;
      } else {
        html += renderSubGroups(items, cat.id);
      }
      html += `</div>`;
    });
    el.innerHTML = html;
    return;
  }

  // Filtered view
  const visible = visibleCards(state.cards).filter(c=>c.cat===state.filter);
  if (visible.length===0) {
    el.innerHTML = `<div class="empty">Нет новостей в этом разделе</div>`;
  } else {
    el.innerHTML = renderSubGroups(visible, state.filter);
  }
}

function renderSubGroups(items, catId) {
  if (catId !== "local" && catId !== "finance") {
    return `<div class="grid">${items.map(cardHTML).join("")}</div>`;
  }
  const order = catId === "local" ? ["yaroslavl","moscow"] : ["ru-eco","world-eco"];
  const groups = {};
  order.forEach(k => { groups[k] = []; });
  items.forEach(it => {
    const sc = getSubcat(it);
    groups[sc && groups[sc] ? sc : order[0]].push(it);
  });
  let html = "";
  order.forEach(key => {
    const grp = groups[key];
    if (!grp.length) return;
    const m = SUBCAT_META[key];
    html += `<div class="subsec ${m.cls}">${m.label}<span style="font-size:10px;opacity:.6;margin-left:8px;font-weight:400">${grp.length}</span></div>`;
    html += `<div class="grid" style="margin-bottom:16px">${grp.map(it => cardHTML(it, key)).join("")}</div>`;
  });
  return html || `<div class="empty">нет данных</div>`;
}

}

const WESTERN_DOMAINS = ["bbc.com","bbc.co.uk","wsj.com","ft.com","aljazeera.com",
  "bloomberg.com","theguardian.com","nytimes.com","washingtonpost.com","reuters.com"];

function isEnglishSource(sourceName, link) {
  const src = (sourceName||"").toLowerCase();
  const url = (link||"").toLowerCase();
  return WESTERN_DOMAINS.some(d => url.includes(d)) ||
    ["wsj","bbc","ft","al jazeera","bloomberg","guardian","reuters"].some(n => src.includes(n));
}

function translatedLink(link, sourceName) {
  if (!link) return link;
  if (isEnglishSource(sourceName, link)) {
    return "https://translate.google.com/translate?sl=en&tl=ru&u=" + encodeURIComponent(link);
  }
  return link;
}

      ${item.perspectives.western ? `<div class="pb west"><div class="pbl">🌐 Запад</div><p class="pbt">${escHtml(item.perspectives.western)}</p></div>` : ""}
    </div>`;

  const chips    = (item.sources||[]).map(s=>`<span class="chip">${escHtml(s)}</span>`).join("");
  const safeLink = (item.link||"").replace(/"/g,"&quot;");

  return `<div class="card" id="card-${item.id}" style="--acc:${cat.color}" onclick="toggleArticle('${item.id}')">

    <h3 class="ctitle">${escHtml(dTitle)}${item.isNew ? '<span class="card-new-badge">NEW</span>' : ""}</h3>

          .map(r=>`<a class="expand-open-btn" href="${translatedLink(r.link, r.sourceName)}" target="_blank" rel="noopener">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            ${escHtml(r.sourceName||"Источник")}</a>`).join("")}
        <button class="expand-close" onclick="event.stopPropagation();collapseCard('${item.id}')">Свернуть ↑</button>
      </div>
    </div>
  </div>`;
}

function escHtml(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function decodeEntities(str) {
  return (str || "")
    .replace(/&nbsp;/g, " ").replace(/&amp;/g, "&")
    .replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"')
    .replace(/&#(\d+);/g, (_, n) => String.fromCharCode(n))
    .replace(/&#x([0-9a-f]+);/gi, (_, h) => String.fromCharCode(parseInt(h,16)))
    .replace(/ {2,}/g, " ").trim();
}

  const bubble = document.createElement("div");
  bubble.className = "chat-bubble" + (text === "…" ? " loading" : "");
  bubble.innerHTML = text === "…" ? "…" : linkify(escHtml(text));
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function updateChatMsg(id, text) {
  const el = document.getElementById(id);
  if (!el) return;
  const bubble = el.querySelector(".chat-bubble");
  if (!bubble) return;
  bubble.classList.remove("loading");
  bubble.innerHTML = linkify(escHtml(text));
  document.getElementById("chat-messages").scrollTop = 9999;
}

function linkify(text) {
  return text.replace(/\n/g, "<br>");
}

async function sendChat() {
  const inp = document.getElementById("chat-input");
  const btn = document.getElementById("chat-send");
  const key = state.groqKey;
  if (!inp || !key) return;
  const text = inp.value.trim();
  if (!text) return;

  inp.value = "";
  inp.style.height = "36px";
  btn.disabled = true;

  appendChatMsg("user", text);
  chatHistory.push({ role: "user", content: text });

  // Build system context — short and tight to avoid 413
  const headlines = state.cards.slice(0, 10).map((c, i) =>
    `${i+1}. ${(c.title_ru || c.title || "").slice(0, 70)}`
  ).join("\n");

  const systemPrompt = `Ты ассистент MMSAWW NEWS. Отвечай по-русски, кратко.\nНовости сегодня:\n${headlines}`;

  // Cap history: last 4 messages, user≤300 chars, assistant≤150 chars (search replies are huge)
  const trimmedHistory = chatHistory.slice(-4).map(m => ({
    role: m.role,
    content: (m.content || "").slice(0, m.role === "assistant" ? 150 : 300)
  }));

  const loadingId = "chat-msg-" + Date.now();
  appendChatMsg("ai", "…", loadingId);

  try {
    const res = await Promise.race([
      fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
        body: JSON.stringify({
          model: "compound-beta",
          max_tokens: 600,
          messages: [
            { role: "system", content: systemPrompt },
            ...trimmedHistory
          ]
        })
      }),
      new Promise((_, r) => setTimeout(() => r(new Error("timeout")), 20000))
    ]);

    if (!res.ok) throw new Error("groq " + res.status);
    const data = await res.json();
    // compound-beta may return content as array of blocks
    const rawContent = data.choices?.[0]?.message?.content;
    let reply;
    if (Array.isArray(rawContent)) {
      reply = rawContent
        .filter(b => b.type === "text")
        .map(b => b.text)
        .join("\n")
        .trim() || "Нет ответа";
    } else {
      reply = (rawContent || "").trim() || "Нет ответа";
    }
    updateChatMsg(loadingId, reply);
    // Store truncated reply — prevents history snowball (413)
    chatHistory.push({ role: "assistant", content: reply.slice(0, 150) });
  } catch (e) {
    updateChatMsg(loadingId, "Ошибка: " + (e.message || "нет ответа"));
  } finally {
    btn.disabled = false;
    inp.focus();
  }
}

async function loadBTC() {
  try {
    const res = await Promise.race([
      fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true"),

    document.getElementById("btc-val").textContent = "$" + d.usd.toLocaleString("en-US", {maximumFractionDigits:0});
    const chg = d.usd_24h_change;
    const el = document.getElementById("btc-chg");
    el.textContent = (chg >= 0 ? "+" : "") + chg.toFixed(2) + "%";
    el.className = "rate-chg " + (chg > 0.3 ? "up" : chg < -0.3 ? "dn" : "flat");
  } catch {}
}

async function loadCBR() {
  const CBR = "https://www.cbr-xml-daily.ru/daily_json.js";
  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(CBR)}`,
    `https://corsproxy.io/?${encodeURIComponent(CBR)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(CBR)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(CBR)}`,
  ];
  let cbr = null;
  for (const p of proxies) {
    try {
      const res = await Promise.race([fetch(p), new Promise((_,r) => setTimeout(()=>r("to"),5000))]);
      if (!res.ok) continue;
      const ct = res.headers.get("content-type")||"";
      const text = ct.includes("json") ? (await res.json()).contents||"" : await res.text();
      if (text && text.includes("USD")) { cbr = JSON.parse(text); break; }
    } catch { continue; }
  }
  if (!cbr) { document.getElementById("rates-ts").textContent = "ЦБ: нет данных"; return; }

  const usd = cbr.Valute.USD, eur = cbr.Valute.EUR;
  const fmt = r => r.toLocaleString("ru-RU",{minimumFractionDigits:2,maximumFractionDigits:2});
  const chg = (cur,prev) => {
    const d = cur-prev;
    return { text:(d>0?"+":"")+d.toFixed(2)+" ₽", cls: d>0.01?"up":d<-0.01?"dn":"flat" };
  };

  document.getElementById("usd-val").textContent = fmt(usd.Value)+" ₽";
  const uc = chg(usd.Value,usd.Previous);
  document.getElementById("usd-chg").textContent = uc.text;
  document.getElementById("usd-chg").className   = "rate-chg "+uc.cls;

  document.getElementById("eur-val").textContent = fmt(eur.Value)+" ₽";
  const ec = chg(eur.Value,eur.Previous);
  document.getElementById("eur-chg").textContent = ec.text;
  document.getElementById("eur-chg").className   = "rate-chg "+ec.cls;

  // Label with weekend notice
  const now = new Date();
  const dow = now.getDay();
  const isWeekend = dow === 0 || dow === 6;
  const dateStr = new Date(cbr.Date).toLocaleDateString("ru-RU",{day:"numeric",month:"short"});
  document.getElementById("rates-ts").textContent =
    "ЦБ РФ · " + dateStr + (isWeekend ? " · пятничный курс" : "");

  // Weekday auto-refresh at 11:30 MSK
  if (!isWeekend) {
    const msk = new Date(now.toLocaleString("en-US",{timeZone:"Europe/Moscow"}));
    const mskMin = msk.getHours()*60+msk.getMinutes();
    const ms = mskMin < 11*60+30
      ? (11*60+30-mskMin)*60000
      : 30*60000;
    setTimeout(loadCBR, ms);
  }
}

const WMO_ICONS = {
  0:"☀️",1:"🌤",2:"⛅️",3:"☁️",45:"🌫",48:"🌫",
  51:"🌦",53:"🌦",55:"🌧",61:"🌧",63:"🌧",65:"🌧",
  71:"🌨",73:"🌨",75:"❄️",77:"🌨",
  80:"🌦",81:"🌧",82:"⛈",85:"🌨",86:"❄️",
  95:"⛈",96:"⛈",99:"⛈"
};
const WMO_LABELS = {
  0:"Ясно",1:"Почти ясно",2:"Переменная",3:"Пасмурно",
  45:"Туман",48:"Туман",51:"Изморось",53:"Изморось",55:"Изморось",
  61:"Дождь",63:"Дождь",65:"Ливень",71:"Снег",73:"Снег",75:"Метель",
  80:"Ливни",81:"Ливни",82:"Ливни",85:"Снегопад",86:"Снегопад",
  95:"Гроза",96:"Гроза",99:"Гроза"
};

function loadWeather() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const {latitude:lat, longitude:lon} = pos.coords;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m&wind_speed_unit=ms&timezone=auto`;
      const res = await Promise.race([fetch(url), new Promise((_,r)=>setTimeout(()=>r("to"),7000))]);
      if (!res.ok) return;
      const d = (await res.json()).current;
      const temp   = Math.round(d.temperature_2m);
      const feels  = Math.round(d.apparent_temperature);
      const code   = d.weathercode;
      const wind   = Math.round(d.windspeed_10m);
      const icon   = WMO_ICONS[code] || "🌡";
      const label  = WMO_LABELS[code] || "";

      document.getElementById("weather-val").textContent = `${icon} ${temp}°C (ощущается ${feels}°C)`;
      document.getElementById("weather-desc").textContent = `${label} · 💨 ${wind} м/с`;
      document.getElementById("weather-desc").className = "rate-chg flat";
      document.getElementById("weather-item").style.display = "";
      document.getElementById("weather-dot").style.display  = "";
      setTimeout(loadWeather, 30*60*1000);
    } catch {}
  }, ()=>{}, {timeout:9000, maximumAge:300000});
}

async function generateSentiment(cards) {
  const m   = state.sentimentModel;
  const key = state.groqKey;

  const wrap  = document.getElementById("siri-wrap");
  const body  = document.getElementById("siri-body");
  const badge = document.getElementById("siri-badge");
  const regen = document.getElementById("siri-regen");
  if (!wrap || !body) return;

  wrap.style.display = "";
  wrap.classList.remove("idle");

  if (m === "off" || !key) {
    wrap.classList.add("idle");
    body.innerHTML = `<div class="siri-no-key">
      Для резюме добавьте ключ Groq
      <button class="siri-setup-btn" onclick="document.getElementById('api-panel').classList.add('open')">⚙ Настройки</button>
    </div>`;
    body.classList.add("open");
    siriBodyOpen = true;
    return;
  }

  // Check daily cache keyed by yesterday's date
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yKey = "siri_" + yesterday.toISOString().slice(0, 10);
  const cached = (() => {
    try { return JSON.parse(localStorage.getItem(yKey) || "null"); } catch(e) { return null; }
  })();
  if (cached && cached.html) {
    body.innerHTML = cached.html;
    badge.textContent = cached.badge || "";
    badge.className   = "siri-badge " + (cached.bc || "neutral");
    body.classList.add("open");
    siriBodyOpen = true;
    if (regen) regen.style.display = "";
    wrap.classList.add("idle");
    state.sentimentDone = true;
    return;
  }

  body.innerHTML = `<div class="siri-loading"><div class="siri-dots"><span></span><span></span><span></span><span></span><span></span></div> составляю резюме за вчера…</div>`;
  body.classList.add("open");
  siriBodyOpen = true;
  if (regen) regen.style.display = "none";

  // Use yesterday's cards; fallback to all cards if too few
  const yStart = new Date(yesterday); yStart.setHours(0,0,0,0);
  const yEnd   = new Date(yesterday); yEnd.setHours(23,59,59,999);
  const yCards = cards.filter(c => c.date >= yStart && c.date <= yEnd);
  const pool   = yCards.length >= 3 ? yCards : cards.slice(0, 40);

  // Group by category
  const catLabels = { geopolitics:"Геополитика", finance:"Финансы", tech:"Технологии", lifestyle:"Лайфстайл", local:"Локальные" };
  const byCat = {};
  pool.forEach(c => { (byCat[c.cat] = byCat[c.cat] || []).push(c); });

  const dateStr = yesterday.toLocaleDateString("ru-RU", { day:"numeric", month:"long" });
  const sections = Object.entries(catLabels)
    .filter(([id]) => (byCat[id] || []).length > 0)
    .map(([id, label]) => {
      const items = (byCat[id] || []).slice(0, 7)
        .map(c => `- ${c.title_ru || c.title}`)
        .join("\n");
      return `### ${label}\n${items}`;
    }).join("\n\n");

  const prompt = `Ты редактор новостного агрегатора. Напиши резюме за ${dateStr} по разделам на русском.

Для каждого раздела — одно-два предложения с ключевыми событиями. Стиль: конкретные факты, имена, цифры, без воды.
В конце одно предложение с тональностью дня (слово: Напряжённая/Тревожная/Нейтральная/Позитивная/Смешанная).

Ответь ТОЛЬКО этими HTML-блоками (пропускай разделы без новостей):
<p><b>🌍 Геополитика:</b> ...</p>
<p><b>💰 Финансы:</b> ...</p>
<p><b>💻 Технологии:</b> ...</p>
<p><b>🎭 Лайфстайл:</b> ...</p>
<p><b>📊 Тональность дня:</b> Слово — одно предложение почему</p>

Максимум 180 слов. Только HTML, без markdown.

Новости за ${dateStr}:
${sections}`;

  try {
    let text = null;
    if (m === "groq") {
      const res = await Promise.race([
        fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            max_tokens: 500,
            messages: [{ role: "user", content: prompt }]
          })
        }),
        new Promise((_,r) => setTimeout(() => r("timeout"), 20000))
      ]);
      if (!res.ok) throw new Error("groq " + res.status);
      const d = await res.json();
      text = d.choices?.[0]?.message?.content?.trim() || null;
    }

    if (!text) throw new Error("empty response");

    const tl = text.toLowerCase();
    let bc = "neutral", bt = "—";
    if (/напряжённ|напряженн/.test(tl))  { bc = "tense";   bt = "Напряжённая"; }
    else if (/тревожн/.test(tl))          { bc = "alarm";   bt = "Тревожная"; }
    else if (/позитивн/.test(tl))         { bc = "calm";    bt = "Позитивная"; }
    else if (/смешанн/.test(tl))          { bc = "mixed";   bt = "Смешанная"; }
    else if (/нейтральн/.test(tl))        { bc = "neutral"; bt = "Нейтральная"; }

    badge.textContent = bt;
    badge.className   = "siri-badge " + bc;
    body.innerHTML    = text;
    if (regen) regen.style.display = "";
    wrap.classList.add("idle");
    state.sentimentDone = true;

    // Cache result by yesterday's date — regenerates automatically next day
    try { localStorage.setItem(yKey, JSON.stringify({ html: text, badge: bt, bc, ts: Date.now() })); } catch(e) {}
    // Prune old siri caches
    try {
      for (const k of Object.keys(localStorage)) {
        if (k.startsWith("siri_") && k !== yKey) localStorage.removeItem(k);
      }
    } catch(e) {}

  } catch(e) {
    wrap.classList.add("idle");
    body.innerHTML = `<div class="siri-no-key" style="color:var(--text3)">
      Ошибка генерации (${(e?.message || "").slice(0, 60)})
      <button class="siri-setup-btn" onclick="regenSentiment()">Повторить</button>
    </div>`;
    if (regen) regen.style.display = "";
  }
}

let modalCache  = {};   // cardId → summary text

function toggleArticle(cardId) {

  } else {

function expandCard(cardId) {
  const card = state.cards.find(c => c.id === cardId);
  if (!card) return;

  }

  }

  // ── Step 1: show RSS content immediately (always available) ──────────────
  const rssText = getRSSText(card);
  bodyEl.innerHTML = renderTextHTML(rssText, false, !!"");

  }
